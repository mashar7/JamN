<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Clock Ultra - Full Visibility</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Orbitron:wght@700&display=swap');

        :root {
            --bg-color: #000000;
            --hour-color: #ffffff;
            --min-color: #00e5ff;
            --accent-color: #ff4747;
            --char-spacing: 0.15em; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            font-family: 'Antonio', sans-serif;
            transition: background-color 0.5s;
            cursor: pointer; /* Menandakan layar bisa diklik */
        }

        #burn-container {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 1.5s ease-in-out;
        }

        /* --- MODE ARTISTIK (JANGKUNG & RENGGANG) --- */
        .clock-wrapper {
            display: flex;
            align-items: center;
            gap: 120px; 
        }

        #hours {
            font-size: 35vw;
            color: var(--hour-color);
            line-height: 0.8;
            align-self: flex-start;
            letter-spacing: var(--char-spacing);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #minutes {
            font-size: 35vw;
            color: var(--min-color);
            line-height: 0.8;
            align-self: flex-end;
            margin-top: 15vh;
            letter-spacing: var(--char-spacing);
            text-shadow: 0 0 20px rgba(0,229,255,0.2);
        }

        /* --- MODE ANALOG --- */
        #analog-clock {
            display: none;
            width: 55vh;
            height: 55vh;
            border: 15px solid white;
            border-radius: 50%;
            position: relative;
            margin-bottom: 30px;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
        }

        .hour-hand { width: 15px; height: 25%; background: var(--hour-color); }
        .min-hand { width: 10px; height: 40%; background: var(--min-color); }
        .sec-hand { width: 4px; height: 45%; background: var(--accent-color); }

        /* --- MODE DIGITAL --- */
        .digital-mode .clock-wrapper { gap: 40px; }
        .digital-mode #hours, .digital-mode #minutes {
            align-self: center;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 22vw;
            letter-spacing: 0.1em;
        }
        .digital-mode #minutes::before { content: ":"; color: var(--hour-color); margin-right: 30px; }

        .analog-active #analog-clock { display: block; }
        .analog-active .clock-wrapper { display: none; }

        #date-info {
            font-size: 3.5vw;
            margin-top: 40px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 10px;
        }

        /* Menu */
        #menu {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 15px; border-radius: 50px;
            opacity: 0; transition: opacity 0.3s;
            z-index: 1000;
        }
        body:hover #menu { opacity: 1; }
        button {
            background: #222; color: white; border: 1px solid #444;
            padding: 12px 20px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 14px;
        }
        button:hover { background: #444; }
        .btn-fs { background: #0084ff; border-color: #00c3ff; }
    </style>
</head>
<body onclick="autoFullScreen()">

    <div id="burn-container">
        <div id="analog-clock">
            <div class="hand hour-hand" id="hour-h"></div>
            <div class="hand min-hand" id="min-h"></div>
            <div class="hand sec-hand" id="sec-h"></div>
            <div style="position: absolute; top:50%; left:50%; width:20px; height:20px; background:white; border-radius:50%; transform:translate(-50%, -50%);"></div>
        </div>

        <div class="clock-wrapper" id="clockBox">
            <div id="hours">00</div>
            <div id="minutes">00</div>
        </div>
        
        <div id="date-info">MEMUAT...</div>
    </div>

    <div id="menu">
        <button class="btn-fs" onclick="toggleFullScreen()">⛶ FULL SCREEN</button>
        <button onclick="setMode('artistic')">Artistik</button>
        <button onclick="setMode('digital')">Digital</button>
        <button onclick="setMode('analog')">Analog</button>
        <button onclick="changeTheme('#ffffff', '#00e5ff')">Cyan</button>
        <button onclick="changeTheme('#ffffff', '#ffcf00')">Gold</button>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            
            document.getElementById('hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = m.toString().padStart(2, '0');
            
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-info').textContent = now.toLocaleDateString('id-ID', options);

            const hDeg = (h * 30) + (m * 0.5);
            const mDeg = (m * 6);
            const sDeg = (s * 6);
            if(document.getElementById('analog-clock').style.display !== 'none'){
                document.getElementById('hour-h').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
                document.getElementById('min-h').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
                document.getElementById('sec-h').style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            }
        }

        function setMode(mode) {
            document.body.classList.remove('digital-mode', 'analog-active');
            const analog = document.getElementById('analog-clock');
            const wrapper = document.getElementById('clockBox');
            
            if(mode === 'digital') {
                document.body.classList.add('digital-mode');
                analog.style.display = 'none';
                wrapper.style.display = 'flex';
            } else if(mode === 'analog') {
                document.body.classList.add('analog-active');
                analog.style.display = 'block';
                wrapper.style.display = 'none';
            } else {
                analog.style.display = 'none';
                wrapper.style.display = 'flex';
            }
        }

        // Fungsi Auto Full Screen
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Memicu fullscreen saat pertama kali klik layar
        function autoFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            }
        }

        function antiBurn() {
            const container = document.getElementById('burn-container');
            const x = (Math.random() * 6 - 3).toFixed(2);
            const y = (Math.random() * 6 - 3).toFixed(2);
            container.style.transform = `translate(${x}%, ${y}%)`;
        }

        function changeTheme(hColor, mColor) {
            document.documentElement.style.setProperty('--hour-color', hColor);
            document.documentElement.style.setProperty('--min-color', mColor);
        }

        setInterval(updateClock, 1000);
        setInterval(antiBurn, 30000);
        updateClock();
        antiBurn();
    </script>
</body>
</html>
