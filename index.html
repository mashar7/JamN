<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Clock - Refined Dynamic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700&display=swap');

        :root {
            --bg-color: #000000;
            --hour-color: #ffffff;
            --min-color: #94d0d6;
            --char-spacing: 0.12em; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            font-family: 'Antonio', sans-serif;
        }

        #main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .element-group {
            position: absolute;
            display: flex;
            justify-content: center;
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 50vw;
        }

        #group-hours { left: 0; }
        #group-minutes { right: 0; }

        .digit {
            font-size: 42vw; /* Sedikit dikecilkan agar proporsional */
            line-height: 0.9;
            letter-spacing: var(--char-spacing);
            font-weight: 700;
        }

        #hours { color: var(--hour-color); }
        #minutes { color: var(--min-color); }

        /* Desain Tanggal Dinamis */
        #date-info {
            position: absolute;
            bottom: 8vh; /* Tetap di area bawah layar */
            font-size: 3.5vw;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 25px;
            border-radius: 12px;
            z-index: 100;
            white-space: nowrap;
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Menu Auto-Hide */
        #menu {
            position: fixed;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px; border-radius: 50px;
            z-index: 9999;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .show-menu #menu { opacity: 1; }

        button {
            background: #222; color: white; border: 1px solid #444;
            padding: 8px 18px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 1.1vw;
        }
    </style>
</head>
<body onmousemove="showMenu()" onclick="autoFullScreen()">

    <div id="main-stage">
        <div id="date-info">MEMUAT...</div>

        <div id="group-hours" class="element-group">
            <div id="hours" class="digit">00</div>
        </div>

        <div id="group-minutes" class="element-group">
            <div id="minutes" class="digit">00</div>
        </div>
    </div>

    <div id="menu">
        <button style="background:#92abc2" onclick="toggleFullScreen()">⛶ FULL SCREEN</button>
        <button onclick="changeTheme('#ffffff', '#94d0d6')">Cyan</button>
        <button onclick="changeTheme('#ffffff', '#cfd694')">Gold</button>
        <button onclick="changeTheme('#ffffff', '#d694a8')">Red</button>
    </div>

    <script>
        let menuTimeout;

        function showMenu() {
            document.body.classList.add('show-menu');
            clearTimeout(menuTimeout);
            menuTimeout = setTimeout(() => {
                document.body.classList.remove('show-menu');
            }, 3000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('hours').textContent = now.getHours().toString().padStart(2, '0');
            document.getElementById('minutes').textContent = now.getMinutes().toString().padStart(2, '0');
            
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-info').textContent = now.toLocaleDateString('id-ID', options);
        }

        function antiBurn() {
            const groupH = document.getElementById('group-hours');
            const groupM = document.getElementById('group-minutes');
            const dateBox = document.getElementById('date-info');
            
            const hourIsHigh = Math.random() > 0.5;

            if (hourIsHigh) {
                // Jam agak di atas, Menit agak di bawah
                groupH.style.top = "8vh"; 
                groupM.style.top = "22vh"; 
                
                // Tanggal di Kiri Bawah (sejajar kolom Jam)
                dateBox.style.left = "25%";
                dateBox.style.transform = "translateX(-50%)";
            } else {
                // Menit agak di atas, Jam agak di bawah
                groupM.style.top = "8vh";
                groupH.style.top = "22vh";
                
                // Tanggal di Kanan Bawah (sejajar kolom Menit)
                dateBox.style.left = "75%";
                dateBox.style.transform = "translateX(-50%)";
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function autoFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        }

        function changeTheme(hColor, mColor) {
            document.documentElement.style.setProperty('--hour-color', hColor);
            document.documentElement.style.setProperty('--min-color', mColor);
        }

        setInterval(updateClock, 1000);
        setInterval(antiBurn, 20000);
        
        updateClock();
        antiBurn();
    </script>
</body>
</html>
