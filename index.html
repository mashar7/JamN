<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Clock - TV Optimized</title>
    <style>
        /* Menggunakan sistem font cadangan jika Google Fonts gagal dimuat */
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700&display=swap');

        :root {
            --bg-color: #000000;
            --hour-color: #ffffff;
            --min-color: #94d0d6;
            --char-spacing: 0.12em; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            /* Font Antonio dengan fallback sans-serif standar TV */
            font-family: 'Antonio', 'Impact', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .element-group {
            position: absolute;
            display: flex;
            justify-content: center;
            /* Transisi lebih aman untuk prosesor TV yang lebih lambat */
            transition: all 2s ease-in-out;
            width: 50vw;
            will-change: top, left;
        }

        #group-hours { left: 0; }
        #group-minutes { right: 0; }

        .digit {
            font-size: 38vw; /* Ukuran disesuaikan agar tidak overflow di beberapa aspek rasio TV */
            line-height: 0.9;
            letter-spacing: var(--char-spacing);
            font-weight: 700;
        }

        #hours { color: var(--hour-color); }
        #minutes { color: var(--min-color); }

        #date-info {
            position: absolute;
            bottom: 8vh;
            font-size: 2.8vw;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 25px;
            border-radius: 12px;
            z-index: 100;
            white-space: nowrap;
            transition: all 2s ease-in-out;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #menu {
            position: fixed;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px; border-radius: 50px;
            z-index: 9999;
            transition: opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }
        
        .show-menu #menu { opacity: 1; pointer-events: auto; }

        button {
            background: #222; color: white; border: 1px solid #444;
            padding: 10px 20px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 1.2vw;
        }
    </style>
</head>
<body onmousemove="handleInteraction()" onclick="handleInteraction()" ontouchstart="handleInteraction()">

    <div id="main-stage">
        <div id="date-info">MEMUAT...</div>

        <div id="group-hours" class="element-group" style="top: 15vh;">
            <div id="hours" class="digit">00</div>
        </div>

        <div id="group-minutes" class="element-group" style="top: 15vh;">
            <div id="minutes" class="digit">00</div>
        </div>
    </div>

    <div id="menu">
        <button style="background:#4a6fa5" onclick="toggleFullScreen()">⛶ FULL SCREEN</button>
        <button onclick="changeTheme('#ffffff', '#94d0d6')">Cyan</button>
        <button onclick="changeTheme('#ffffff', '#cfd694')">Gold</button>
        <button onclick="changeTheme('#ffffff', '#d694a8')">Red</button>
    </div>

    <script>
        // Membungkus kode dalam pengecekan DOM agar tidak gagal di TV lama
        document.addEventListener("DOMContentLoaded", function() {
            updateClock();
            antiBurn();
            
            // Interval update jam setiap detik
            setInterval(updateClock, 1000);
            // Interval anti-burn setiap 20 detik (lebih aman untuk panel)
            setInterval(antiBurn, 20000);
        });

        let menuTimeout;

        function handleInteraction() {
            showMenu();
            // Beberapa TV butuh interaksi untuk memulai fullscreen
            autoFullScreen();
        }

        function showMenu() {
            document.body.classList.add('show-menu');
            clearTimeout(menuTimeout);
            menuTimeout = setTimeout(() => {
                document.body.classList.remove('show-menu');
            }, 4000); // 4 detik agar lebih lama sedikit di TV
        }

        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            
            const hoursEl = document.getElementById('hours');
            const minsEl = document.getElementById('minutes');
            const dateEl = document.getElementById('date-info');

            if(hoursEl) hoursEl.textContent = h;
            if(minsEl) minsEl.textContent = m;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            if(dateEl) dateEl.textContent = now.toLocaleDateString('id-ID', options);
        }

        function antiBurn() {
            const groupH = document.getElementById('group-hours');
            const groupM = document.getElementById('group-minutes');
            const dateBox = document.getElementById('date-info');
            
            if(!groupH || !groupM || !dateBox) return;

            const hourIsHigh = Math.random() > 0.5;

            if (hourIsHigh) {
                groupH.style.top = "5vh"; 
                groupM.style.top = "20vh"; 
                dateBox.style.left = "25%";
                dateBox.style.transform = "translateX(-50%)";
            } else {
                groupM.style.top = "5vh";
                groupH.style.top = "20vh";
                dateBox.style.left = "75%";
                dateBox.style.transform = "translateX(-50%)";
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function autoFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
        }

        function changeTheme(hColor, mColor) {
            document.documentElement.style.setProperty('--hour-color', hColor);
            document.documentElement.style.setProperty('--min-color', mColor);
        }
    </script>
</body>
</html>
