<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Clock - System Time</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700&display=swap');

        :root {
            --bg-color: #000000;
            --hour-color: #ffffff;
            --min-color: #e0f7fa; /* Biru Keputihan Soft */
            --char-spacing: 0.12em; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            font-family: 'Antonio', 'Impact', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .element-group {
            position: absolute;
            display: flex;
            justify-content: center;
            transition: all 2.5s ease-in-out;
            width: 50vw;
        }

        #group-hours { left: 0; }
        #group-minutes { right: 0; }

        .digit {
            font-size: 38vw;
            line-height: 0.9;
            letter-spacing: var(--char-spacing);
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        #hours { color: var(--hour-color); }
        #minutes { color: var(--min-color); transition: color 0.8s ease; }

        #date-info {
            position: absolute;
            bottom: 8vh;
            font-size: 2.8vw;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 12px;
            z-index: 100;
            white-space: nowrap;
            transition: all 2.5s ease-in-out;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #menu {
            position: fixed;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px; border-radius: 50px;
            z-index: 9999;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .show-menu #menu { opacity: 1; }

        button {
            background: #222; color: white; border: 1px solid #444;
            padding: 10px 20px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 1.2vw;
        }
    </style>
</head>
<body onmousemove="handleInteraction()" onclick="handleInteraction()">

    <div id="main-stage">
        <div id="date-info">MEMUAT...</div>

        <div id="group-hours" class="element-group" style="top: 15vh;">
            <div id="hours" class="digit">00</div>
        </div>

        <div id="group-minutes" class="element-group" style="top: 15vh;">
            <div id="minutes" class="digit">00</div>
        </div>
    </div>

    <div id="menu">
        <button style="background:#0084ff" onclick="toggleFullScreen()">⛶ FULL SCREEN</button>
        <button onclick="changeTheme('#ffffff', '#e0f7fa')">Soft Blue</button>
        <button onclick="changeTheme('#ffffff', '#fff9c4')">Soft Yellow</button>
        <button onclick="changeTheme('#ffffff', '#ffebee')">Soft Red</button>
    </div>

    <script>
        // Memastikan elemen sudah ada sebelum script berjalan
        window.onload = function() {
            updateClock();
            antiBurn();
            setInterval(updateClock, 1000);
            setInterval(antiBurn, 30000);
        };

        function updateClock() {
            try {
                var sekarang = new Date();
                
                // Ambil data jam dan menit dari sistem TV
                var h = sekarang.getHours();
                var m = sekarang.getMinutes();

                var hString = (h < 10 ? "0" + h : h);
                var mString = (m < 10 ? "0" + m : m);
                
                var hoursEl = document.getElementById('hours');
                var minutesEl = document.getElementById('minutes');
                var dateEl = document.getElementById('date-info');

                if (hoursEl) hoursEl.innerHTML = hString;
                if (minutesEl) minutesEl.innerHTML = mString;

                var hari = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
                var bulan = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
                
                var tglString = hari[sekarang.getDay()] + ", " + sekarang.getDate() + " " + bulan[sekarang.getMonth()] + " " + sekarang.getFullYear();
                if (dateEl) dateEl.innerHTML = tglString;
            } catch(e) {
                console.log("Error updating clock: ", e);
            }
        }

        var menuTimeout;
        function handleInteraction() {
            document.body.classList.add('show-menu');
            clearTimeout(menuTimeout);
            menuTimeout = setTimeout(function() {
                document.body.classList.remove('show-menu');
            }, 4000);
            
            // Coba fullscreen (dipicu interaksi pengguna)
            var el = document.documentElement;
            var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if(rfs && !document.fullscreenElement) {
                rfs.call(el).catch(function(e){});
            }
        }

        function antiBurn() {
            var groupH = document.getElementById('group-hours');
            var groupM = document.getElementById('group-minutes');
            var dateBox = document.getElementById('date-info');
            
            if(!groupH || !groupM) return;

            var hourIsHigh = Math.random() > 0.5;

            if (hourIsHigh) {
                groupH.style.top = "8vh"; 
                groupM.style.top = "22vh"; 
                dateBox.style.left = "25%";
                dateBox.style.transform = "translateX(-50%)";
            } else {
                groupM.style.top = "8vh";
                groupH.style.top = "22vh";
                dateBox.style.left = "75%";
                dateBox.style.transform = "translateX(-50%)";
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                var el = document.documentElement;
                var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
                if(rfs) rfs.call(el);
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function changeTheme(hColor, mColor) {
            document.documentElement.style.setProperty('--hour-color', hColor);
            document.documentElement.style.setProperty('--min-color', mColor);
        }
    </script>
</body>
</html>
